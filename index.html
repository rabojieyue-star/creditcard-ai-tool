以下のユーザー情報をもとに、最適なクレジットカードの組み合わせを診断してください。

【月間支出内訳】
- 食費・日用品（スーパー・コンビニ）：${answers.spending.grocery}円
- 交通費（電車・バス・定期）：${answers.spending.transport}円
- ネット通販（Amazon・楽天など）：${answers.spending.ecommerce}円
- 外食・カフェ：${answers.spending.dining}円
- ガソリン・車関連：${answers.spending.gas}円
- 公共料金（電気・ガス・水道）：${answers.spending.utilities}円
- 通信費（スマホ・インターネット）：${answers.spending.telecom}円
- 旅行・ホテル（年間を月割り）：${answers.spending.travel}円
- 医療・薬局：${answers.spending.medical}円
- その他：${answers.spending.other}円
- 月間合計：${totalMonthly}円
- 金額が不明なカテゴリ：${unknownLabels.join("、") || "なし"}

【現在のカード】
${answers.currentCards.join("、") || "なし"}
${answers.otherCurrentCard ? `その他: ${answers.otherCurrentCard}` : ""}
カード払い比率：${answers.cardUsageRate || "未選択"}

【条件・希望】
- 年会費許容：${answers.annualFeePreference || "未選択"}
- 希望経済圏：${
          answers.economyZones
            .map((zone) => ECONOMY_ZONE_OPTIONS.find((item) => item.value === zone)?.label || zone)
            .join("、") || "こだわりなし"
        }
- 希望枚数：${answers.cardCount}枚まで

【比較対象カード一覧（JSON）】
${JSON.stringify(CREDIT_CARDS, null, 2)}

上記のカード一覧の中から最適な組み合わせを提案し、指定のJSONスキーマで返答してください。
年会費は費用として差し引いて年間還元額を計算してください。
`;

      const validateStep1 = (answers) => {
        const hasSpending = Object.values(answers.spending).some((value) => value > 0);
        const hasUnknown = Object.values(answers.unknownSpending).some(Boolean);
        return hasSpending || hasUnknown;
      };

      const validateStep2 = (answers) => Boolean(answers.cardUsageRate);
      const validateStep3 = (answers) =>
        answers.annualFeePreference !== null && answers.cardCount !== null;

      async function callClaudeAPI(answers) {
        try {
          const response = await fetch(
            "https://anthropic-proxy-l4nb.onrender.com/api/anthropic-proxy",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-6",
                max_tokens: 2000,
                system: SYSTEM_PROMPT,
                messages: [{ role: "user", content: buildUserPrompt(answers) }],
              }),
            },
          );
          if (!response.ok) {
            const body = await response.text();
            throw new Error(`サーバーエラー: ${response.status} ${body}`);
          }
          const data = await response.json();
          const text = typeof data.text === "string" ? data.text.trim() : "";
          const clean = text.replace(/```json\n?|```\n?/g, "").trim();
          return JSON.parse(clean);
        } catch (err) {
          if (err.message === "Failed to fetch") {
            throw new Error(
              "サーバーへの接続に失敗しました。しばらく待ってから再度お試しください。",
            );
          }
          throw err;
        }
      }

            <div className="mb-4 flex items-center justify-between gap-3">
              <h3 className="text-xl font-bold text-slate-900">
                カテゴリ別・最高還元率マップ
              </h3>
              <div className="text-sm text-slate-500">高還元カテゴリを見つけやすく表示</div>
            </div>
            <div className="overflow-x-auto">
              <table className="min-w-full text-sm">
                <thead>
                  <tr className="border-b border-slate-200 text-left text-slate-500">
                    <th className="px-3 py-3">カテゴリ</th>
                    <th className="px-3 py-3">月額</th>
                    <th className="px-3 py-3">使うカード</th>
                    <th className="px-3 py-3">還元率</th>
                    <th className="px-3 py-3">月間還元</th>
                  </tr>
                </thead>
                <tbody>
                  {(result.categoryMap || []).map((row) => (
                    <tr
                      key={`${row.category}-${row.recommendedCard}`}
                      className={`border-b border-slate-100 ${
                        row.rate >= 2 ? "bg-emerald-50" : "bg-white"
                      }`}
                    >
                      <td className="px-3 py-4 font-medium text-slate-900">{row.category}</td>
                      <td className="px-3 py-4 text-slate-600">
                        {currency(row.monthlySpend)}
                      </td>
                      <td className="px-3 py-4 text-slate-600">{row.recommendedCard}</td>
                      <td className="px-3 py-4 font-semibold text-indigo-600">
                        {percentage(row.rate)}
                      </td>
                      <td className="px-3 py-4 font-semibold text-emerald-600">
                        {currency(row.monthlyReturn)}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div className="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
            <div className="rounded-[2rem] bg-white p-6 shadow-sm ring-1 ring-slate-200">
              <h3 className="text-xl font-bold text-slate-900">切り替え時の注意点</h3>
              <ul className="mt-4 space-y-3 text-sm leading-7 text-slate-600">
                {(result.warnings || []).map((warning, index) => (
                  <li
                    key={`${warning}-${index}`}
                    className="rounded-2xl bg-slate-50 px-4 py-3"
                  >
                    {warning}
                  </li>
                ))}
              </ul>
            </div>

            <div className="space-y-6">
              <div className="rounded-[2rem] bg-white p-6 shadow-sm ring-1 ring-slate-200">
                <h3 className="text-xl font-bold text-slate-900">ワンポイント</h3>
                <p className="mt-4 text-sm leading-7 text-slate-600">{result.tip}</p>
              </div>
              <div className="rounded-[2rem] bg-slate-900 p-6 text-sm leading-7 text-slate-200 shadow-sm">
                <h3 className="text-lg font-bold text-white">免責事項</h3>
                <p className="mt-3">
                  本診断は参考情報です。還元率・年会費は変更される場合があります。カード申込前に各カード会社の公式サイトでご確認ください。
                </p>
              </div>
            </div>
          </div>

          <div className="text-center">
            <button
              type="button"
              onClick={onReset}
              className="inline-flex min-h-[44px] items-center justify-center rounded-full bg-indigo-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-indigo-700"
            >
              もう一度診断する
            </button>
          </div>
        </div>
      );

      function SimDiagnosisTool() {
        const [state, setState] = useState(initialState);

        const totalMonthly = Object.values(state.answers.spending).reduce((a, b) => a + b, 0);
        const totalAnnual = totalMonthly * 12;
        const usageRateRatio =
          USAGE_RATE_OPTIONS.find((item) => item.value === state.answers.cardUsageRate)
            ?.ratio || 0;
        const currentEstimate = Math.round(totalAnnual * usageRateRatio * 0.005);

        const setError = (message) => {
          setState((prev) => ({ ...prev, error: message }));
        };

        const clearError = () => {
          setState((prev) => ({ ...prev, error: null }));
        };

        const updateSpending = (field, rawValue) => {
          const config = SPENDING_FIELDS.find((item) => item.field === field);
          const nextValue = Number.isFinite(rawValue)
            ? Math.max(0, Math.min(config.max, Math.round(rawValue / 1000) * 1000))
            : 0;

          clearError();
          setState((prev) => ({
            ...prev,
            answers: {
              ...prev.answers,
              spending: { ...prev.answers.spending, [field]: nextValue },
              unknownSpending: { ...prev.answers.unknownSpending, [field]: false },
            },
          }));
        };

        const toggleUnknownSpending = (field) => {
          clearError();
          setState((prev) => {
            const nextUnknown = !prev.answers.unknownSpending[field];
            return {
              ...prev,
              answers: {
                ...prev.answers,
                unknownSpending: { ...prev.answers.unknownSpending, [field]: nextUnknown },
                spending: {
                  ...prev.answers.spending,
                  [field]: nextUnknown ? 0 : prev.answers.spending[field],
                },
              },
            };
          });
        };

        const toggleCurrentCard = (card) => {
          clearError();
          setState((prev) => {
            const exists = prev.answers.currentCards.includes(card);
            const currentCards = exists
              ? prev.answers.currentCards.filter((item) => item !== card)
              : [...prev.answers.currentCards, card];
            return { ...prev, answers: { ...prev.answers, currentCards } };
          });
        };

        const toggleEconomyZone = (zone) => {
          clearError();
          setState((prev) => {
            const exists = prev.answers.economyZones.includes(zone);
            let economyZones = exists
              ? prev.answers.economyZones.filter((item) => item !== zone)
              : [...prev.answers.economyZones, zone];

            if (zone === "cashback" && !exists) {
              economyZones = ["cashback"];
            } else if (zone !== "cashback") {
              economyZones = economyZones.filter((item) => item !== "cashback");
            }

            return { ...prev, answers: { ...prev.answers, economyZones } };
          });
        };

        const goNext = () => {
          clearError();

          if (state.step === 1 && !validateStep1(state.answers)) {
            setError("少なくとも1カテゴリの金額入力、または「わからない」の選択が必要です。");
            return;
          }
          if (state.step === 2 && !validateStep2(state.answers)) {
            setError("カード払い比率を選択してください。");
            return;
          }
          if (state.step === 3 && !validateStep3(state.answers)) {
            setError("年会費の希望と管理できる枚数を選択してください。");
            return;
          }

          setState((prev) => ({ ...prev, step: Math.min(prev.step + 1, 3) }));
        };

        const goBack = () => {
          clearError();
          setState((prev) => ({ ...prev, step: Math.max(prev.step - 1, 1) }));
        };

        const resetAll = () => {
          setState(initialState);
        };

        const runDiagnosis = async () => {
          clearError();

          if (!validateStep3(state.answers)) {
            setError("条件設定を確認してください。");
            return;
          }

          setState((prev) => ({ ...prev, loading: true, result: null }));

          try {
            const result = await callClaudeAPI({ ...state.answers, totalMonthly });
            setState((prev) => ({ ...prev, loading: false, result, step: 4 }));
          } catch (error) {
            setState((prev) => ({
              ...prev,
              loading: false,
              error: error.message || "診断に失敗しました。",
            }));
          }
        };

        return (
          <div
            className="min-h-screen bg-[#FAFAF9] px-4 py-8 text-[#1E293B] sm:px-6 lg:px-8"
            style={{
              backgroundImage:
                "radial-gradient(circle at top left, rgba(99,102,241,0.12), transparent 35%), radial-gradient(circle at top right, rgba(34,197,94,0.10), transparent 30%)",
            }}
          >
            <div className="mx-auto max-w-6xl">
              <div className="mb-8 overflow-hidden rounded-[2rem] bg-slate-900 px-6 py-8 text-white shadow-xl">
                <h1 className="mt-4 max-w-3xl text-3xl font-black tracking-tight sm:text-5xl">
                  クレジットカード最適化AI診断
                </h1>
                <p className="mt-4 max-w-2xl text-sm leading-7 text-slate-300 sm:text-base">
                  月間支出パターンから、あなたに合うカードの組み合わせと年間のお得額を見える化します。
                </p>
              </div>

              <ProgressBar step={state.step} loading={state.loading} result={state.result} />

              {state.error ? (
                <div className="mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                  {state.error}
                </div>
              ) : null}

              {state.loading ? <LoadingAnimation /> : null}

              {!state.loading && !state.result ? (
                <div className="rounded-[2rem] bg-white p-6 shadow-sm ring-1 ring-slate-200 sm:p-8">
                  {state.step === 1 ? (
                    <div>
                      <div className="mb-6">
                        <h2 className="text-2xl font-bold text-slate-900">Step 1. 月間支出の入力</h2>
                        <p className="mt-2 text-sm text-slate-500">
                          大体の金額で構いません。わからないカテゴリはそのまま不明として進められます。
                        </p>
                      </div>

                      <div className="grid gap-4 lg:grid-cols-2">
                        {SPENDING_FIELDS.map((item) => (
                          <SpendingSlider
                            key={item.field}
                            {...item}
                            value={state.answers.spending[item.field]}
                            unknown={state.answers.unknownSpending[item.field]}
                            onChange={updateSpending}
                            onToggleUnknown={toggleUnknownSpending}
                          />
                        ))}
                      </div>

                      <div className="mt-6 rounded-[2rem] bg-slate-900 p-6 text-white">
                        <div className="text-sm text-slate-300">リアルタイム集計</div>
                        <div className="mt-3 grid gap-4 sm:grid-cols-2">
                          <div>
                            <div className="text-xs uppercase tracking-[0.18em] text-slate-400">
                              月間合計
                            </div>
                            <div className="mt-2 text-3xl font-black">{currency(totalMonthly)}</div>
                          </div>
                          <div>
                            <div className="text-xs uppercase tracking-[0.18em] text-slate-400">
                              年間合計
                            </div>
                            <div className="mt-2 text-3xl font-black text-amber-300">
                              {currency(totalAnnual)}
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : null}

                  {state.step === 2 ? (
                    <div>
                      <div className="mb-6">
                        <h2 className="text-2xl font-bold text-slate-900">Step 2. 現在のカード確認</h2>
                        <p className="mt-2 text-sm text-slate-500">
                          現在使っているカードと、カード払い比率の目安を教えてください。
                        </p>
                      </div>

                      <div className="grid gap-6 lg:grid-cols-[1fr_0.95fr]">
                        <div className="rounded-3xl bg-slate-50 p-5">
                          <h3 className="text-lg font-semibold text-slate-900">
                            Q1. 現在メインで使っているカード
                          </h3>
                          <div className="mt-4 grid gap-3 sm:grid-cols-2">
                            {CURRENT_CARD_OPTIONS.map((card) => (
                              <label
                                key={card}
                                className="inline-flex min-h-[44px] items-center gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700"
                              >
                                <input
                                  type="checkbox"
                                  checked={state.answers.currentCards.includes(card)}
                                  onChange={() => toggleCurrentCard(card)}
                                  className="h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"
                                />
                                {card}
                              </label>
                            ))}
                          </div>
                          <div className="mt-4">
                            <label className="mb-2 block text-sm font-medium text-slate-700">
                              その他
                            </label>
                            <input
                              type="text"
                              value={state.answers.otherCurrentCard}
                              onChange={(event) =>
                                setState((prev) => ({
                                  ...prev,
                                  answers: { ...prev.answers, otherCurrentCard: event.target.value },
                                }))
                              }
                              className="min-h-[44px] w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
                              placeholder="自由記入"
                            />
                          </div>
                          <label className="mt-4 inline-flex min-h-[44px] items-center gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700">
                            <input
                              type="checkbox"
                              checked={state.answers.currentCards.includes("クレジットカードをあまり使っていない")}
                              onChange={() => toggleCurrentCard("クレジットカードをあまり使っていない")}
                              className="h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"
                            />
                            クレジットカードをあまり使っていない
                          </label>
                        </div>

                        <div className="rounded-3xl bg-slate-50 p-5">
                          <h3 className="text-lg font-semibold text-slate-900">
                            Q2. 現在の年間カード利用合計の目安
                          </h3>
                          <p className="mt-2 text-sm text-slate-500">
                            入力した支出をすべてカード払いにすると年間
                            <span className="mx-1 font-bold text-indigo-600">{currency(totalAnnual)}</span>
                            のご利用です。
                          </p>
                          <div className="mt-4 space-y-3">
                            {USAGE_RATE_OPTIONS.map((option) => (
                              <label
                                key={option.value}
                                className={`flex min-h-[44px] cursor-pointer items-center gap-3 rounded-2xl border px-4 py-3 text-sm ${
                                  state.answers.cardUsageRate === option.value
                                    ? "border-indigo-500 bg-indigo-50 text-indigo-900"
                                    : "border-slate-200 bg-white text-slate-700"
                                }`}
                              >
                                <input
                                  type="radio"
                                  name="cardUsageRate"
                                  checked={state.answers.cardUsageRate === option.value}
                                  onChange={() =>
                                    setState((prev) => ({
                                      ...prev,
                                      answers: { ...prev.answers, cardUsageRate: option.value },
                                    }))
                                  }
                                  className="h-4 w-4 border-slate-300 text-indigo-600 focus:ring-indigo-500"
                                />
                                {option.label}
                              </label>
                            ))}
                          </div>
                          <div className="mt-4 rounded-2xl bg-white p-4 text-sm text-slate-600">
                            現在の推定還元額は
                            <span className="mx-1 font-bold text-emerald-600">
                              年間 {currency(currentEstimate)}
                            </span>
                            として比較に使います。
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : null}

                  {state.step === 3 ? (
                    <div>
                      <div className="mb-6">
                        <h2 className="text-2xl font-bold text-slate-900">Step 3. 条件・希望の確認</h2>
                        <p className="mt-2 text-sm text-slate-500">
                          年会費、経済圏、管理できる枚数を選ぶと診断精度が上がります。
                        </p>
                      </div>

                      <div className="grid gap-6 lg:grid-cols-[1fr_1fr]">
                        <div className="space-y-6">
                          <div className="rounded-3xl bg-slate-50 p-5">
                            <h3 className="text-lg font-semibold text-slate-900">Q3. 年会費について</h3>
                            <div className="mt-4 space-y-3">
                              {ANNUAL_FEE_OPTIONS.map((option) => (
                                <label
                                  key={option}
                                  className={`flex min-h-[44px] cursor-pointer items-center gap-3 rounded-2xl border px-4 py-3 text-sm ${
                                    state.answers.annualFeePreference === option
                                      ? "border-indigo-500 bg-indigo-50 text-indigo-900"
                                      : "border-slate-200 bg-white text-slate-700"
                                  }`}
                                >
                                  <input
                                    type="radio"
                                    name="annualFeePreference"
                                    checked={state.answers.annualFeePreference === option}
                                    onChange={() =>
                                      setState((prev) => ({
                                        ...prev,
                                        answers: { ...prev.answers, annualFeePreference: option },
                                      }))
                                    }
                                    className="h-4 w-4 border-slate-300 text-indigo-600 focus:ring-indigo-500"
                                  />
                                  {option}
                                </label>
                              ))}
                            </div>
                          </div>

                          <div className="rounded-3xl bg-slate-50 p-5">
                            <h3 className="text-lg font-semibold text-slate-900">
                              Q5. 何枚まで管理できますか？
                            </h3>
                            <div className="mt-4 grid gap-3 sm:grid-cols-3">
                              {CARD_COUNT_OPTIONS.map((count) => (
                                <button
                                  key={count}
                                  type="button"
                                  onClick={() =>
                                    setState((prev) => ({
                                      ...prev,
                                      answers: { ...prev.answers, cardCount: count },
                                    }))
                                  }
                                  className={`min-h-[56px] rounded-2xl border px-4 py-3 text-sm font-semibold transition ${
                                    state.answers.cardCount === count
                                      ? "border-emerald-500 bg-emerald-50 text-emerald-700"
                                      : "border-slate-200 bg-white text-slate-700 hover:border-slate-300"
                                  }`}
                                >
                                  {count}枚
                                </button>
                              ))}
                            </div>
                          </div>
                        </div>

                        <div className="rounded-3xl bg-slate-50 p-5">
                          <h3 className="text-lg font-semibold text-slate-900">
                            Q4. 使いたいポイント・経済圏
                          </h3>
                          <div className="mt-4 grid gap-3">
                            {ECONOMY_ZONE_OPTIONS.map((option) => (
                              <label
                                key={option.value}
                                className={`inline-flex min-h-[44px] items-center gap-3 rounded-2xl border px-4 py-3 text-sm ${
                                  state.answers.economyZones.includes(option.value)
                                    ? "border-indigo-500 bg-indigo-50 text-indigo-900"
                                    : "border-slate-200 bg-white text-slate-700"
                                }`}
                              >
                                <input
                                  type="checkbox"
                                  checked={state.answers.economyZones.includes(option.value)}
                                  onChange={() => toggleEconomyZone(option.value)}
                                  className="h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"
                                />
                                {option.label}
                              </label>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : null}

                  <div className="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-between">
                    <button
                      type="button"
                      onClick={goBack}
                      disabled={state.step === 1}
                      className="min-h-[44px] rounded-full border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700 transition disabled:cursor-not-allowed disabled:opacity-50"
                    >
                      戻る
                    </button>

                    {state.step < 3 ? (
                      <button
                        type="button"
                        onClick={goNext}
                        className="min-h-[44px] rounded-full bg-indigo-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-indigo-700"
                      >
                        次へ進む
                      </button>
                    ) : (
                      <button
                        type="button"
                        onClick={runDiagnosis}
                        className="min-h-[44px] rounded-full bg-emerald-500 px-6 py-3 text-sm font-semibold text-white transition hover:bg-emerald-600"
                      >
                        AIで診断する
                      </button>
                    )}
                  </div>
                </div>
              ) : null}

              {!state.loading && state.result ? (
                <ResultDisplay
                  result={state.result}
                  currentEstimate={currentEstimate}
                  onReset={resetAll}
                />
              ) : null}
            </div>
          </div>
        );
      }

      const mount = () => {
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<SimDiagnosisTool />);
      };

      if (window.__SIM_READY__) {
        mount();
      } else {
        window.addEventListener("sim-react-ready", mount, { once: true });
      }
    </script>
  </body>
</html>
